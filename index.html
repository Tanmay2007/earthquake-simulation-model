<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SeismoSim — Arduino Earthquake Simulation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- MAIN SCROLLABLE CONTENT -->
  <main class="content">
    
    <!-- 1. MODEL VIEWER -->
    <section id="model-viewer" class="section">
      <h2 class="section-title">3D Model Viewer</h2>
      
      <div class="iframe-container">
        <div class="iframe-loading" id="iframe-loader">
          <span class="loader-text">Initialising 3D Scene…</span>
        </div>
        <iframe
          id="model-iframe"
          src="model.html"
          title="SeismoSim 3D Earthquake Simulation"
          allow="fullscreen"
          frameborder="0"
          onload="document.getElementById('iframe-loader').style.opacity='0'; setTimeout(()=>document.getElementById('iframe-loader').style.display='none',400);"
        ></iframe>
      </div>

      
      <div class="chips-row">
        <div class="chip">Drag to Rotate</div>
        <div class="chip">Scroll to Zoom</div>
      </div>
    </section>

  </main>

  <script src="js/script.js"></script>
</body>
</html>
